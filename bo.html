<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BOセミナー記録</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --paper: #fffdf8;
      --ink: #24211d;
      --muted: #756f66;
      --line: #e4ddd1;
      --accent: #7b4e2d;
      --accent-soft: #efe4d7;
      --shadow: 0 14px 35px rgba(65, 48, 31, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(123, 78, 45, .10), transparent 30rem),
        var(--bg);
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
      line-height: 1.75;
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 56px auto 72px;
    }

    header {
      margin-bottom: 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: .84rem;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 600;
      letter-spacing: .04em;
    }

    .note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .96rem;
    }

    .year-nav {
      margin: 24px 0 28px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .year-nav a {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: var(--accent-soft);
      font-size: .9rem;
    }

    .year-block {
      margin: 28px 0;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .year-block h2 {
      margin: 0 0 18px;
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: .08em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .year-block h2::after {
      content: "";
      height: 1px;
      background: var(--line);
      flex: 1;
    }

    .session-list {
      display: grid;
      gap: 2px;
    }

    .session {
      display: grid;
      grid-template-columns: 7.5rem 5.5rem 1fr;
      gap: 14px;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .session:nth-child(odd) {
      background: rgba(239, 228, 215, .38);
    }

    .session time {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      white-space: nowrap;
    }

    .session-time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .session-topic {
      overflow-wrap: anywhere;
    }


    @media (max-width: 700px) {
      .page { margin-top: 32px; }
      .year-block { padding: 18px; border-radius: 18px; }
      .session {
        grid-template-columns: 1fr;
        gap: 0;
        padding: 12px;
      }
      .session-time { margin-bottom: 4px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <p class="eyebrow">seminar log</p>
      <h1>BOセミナー記録</h1>
    </header>

    <nav class="year-nav" aria-label="年別リンク">
      <a href="#y2026">2026</a>
    </nav>


      <section class="year-block" aria-labelledby="y2026">
        <h2 id="y2026">2026</h2>
        <div class="session-list">

          <article class="session">
            <time datetime="2026-07-06">2026-07-06</time>
            <span class="session-time">14:00-</span>
            <span class="session-topic">Kedlaya_Notes on condensed mathematics, Section 1.1-1.3</span>
          </article>

        </div>
      </section>
  </main>

</body>
</html>
